<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>登录 · Spring Cloud Demo</title>
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/css/themes.css"/>
    <link rel="stylesheet" href="/css/app.css"/>
</head>
<body class="login-page">
<div id="themeMount" class="theme-mount theme-mount--login"></div>
<div class="login-card">
    <div class="login-brand">
        <div class="login-logo">SC</div>
        <h1>Spring Cloud 管理平台</h1>
        <p>微服务演示 · 网关统一入口</p>
    </div>
    <div id="alert" class="alert err"></div>
    <form id="loginForm">
        <label for="userId">用户 ID</label>
        <select id="userId" name="userId">
            <option value="1">1 - 演示用户一号（超级管理员）</option>
            <option value="2">2 - 演示用户二号（运营专员）</option>
            <option value="10086">10086 - 演示用户（普通用户）</option>
        </select>
        <label for="password">密码</label>
        <input id="password" name="password" type="password" value="123456" autocomplete="current-password"/>
        <button type="submit" class="btn btn-block" id="btnSubmit">登 录</button>
    </form>
    <p class="login-hint">演示环境固定密码 <strong>123456</strong><br/>登录成功后将进入管理后台</p>
</div>
<script src="/js/app.js"></script>
<script>
(function () {
    AppTheme.init();
    AppTheme.mountPicker(document.getElementById('themeMount'));
    AppSession.redirectIfLoggedIn('/admin.html');

    const form = document.getElementById('loginForm');
    const alertEl = document.getElementById('alert');
    const btn = document.getElementById('btnSubmit');

    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        alertEl.classList.remove('show');
        btn.disabled = true;
        btn.textContent = '登录中…';
        try {
            const userId = Number(document.getElementById('userId').value);
            const password = document.getElementById('password').value;
            await login(userId, password);
            window.location.replace('/admin.html');
        } catch (err) {
            showAlert(alertEl, err.message || '登录失败', true);
            btn.disabled = false;
            btn.textContent = '登 录';
        }
    });
})();
</script>
</body>
</html>
